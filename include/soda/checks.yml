checks for yt_api:
  - missing_count("video_id") = 0
  - duplicate_count("video_id") = 0

  - likes_count_greater_than_vid_views = 0:
      name: Check for likes_count greater than video_views
      likes_count_greater_than_vid_views query:
        SELECT COUNT(*)
        FROM yt_api
        WHERE "likes_count" > "video_views"

  # - comment_count_greater_than_vid_views = 1:
  - comment_count_greater_than_vid_views = 0:
      name: Check for comment_count greater than video_views
      comment_count_greater_than_vid_views query:
        SELECT COUNT(*)
        FROM yt_api
        WHERE "comment_count" > "video_views"